// 字幕显示前 strip 控制标记
function stripControlMarkers(text) {
  return String(text || '')
    .replace(/\[(?:break|breath|long[ -]break)\]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

// ============================================================
// STATE
// ============================================================
const state = {
  selectedId: 'ch04',
  // 暂存的改动: { chunkId: { tts?: string, subtitle?: string } }
  edits: {},
  editing: null,        // 当前展开编辑的 chunkId

  // 单 chunk 播放
  playingChunkId: null, // 当前正在播放的 chunk id
  chunkPlayTimer: null,
  chunkPlayElapsed: 0,
};

// ============================================================
// UTIL
// ============================================================
function getTotalDuration(epId) {
  const chunks = chunkData[epId] || [];
  return chunks.reduce((s, c) => s + (c.duration || 0), 0);
}

function getChunkAtTime(epId, t) {
  const chunks = chunkData[epId] || [];
  let acc = 0;
  for (const c of chunks) {
    if (t >= acc && t < acc + c.duration) {
      return { chunk: c, startInGlobal: acc };
    }
    acc += c.duration;
  }
  return chunks.length > 0 ? { chunk: chunks[chunks.length - 1], startInGlobal: acc - chunks[chunks.length - 1].duration } : null;
}

function getDisplaySubtitle(c) {
  return stripControlMarkers(c.subtitle_text || c.text);
}

function fmtTime(t) {
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60);
  return `${m}:${String(s).padStart(2, '0')}`;
}

function getDirtyType(chunkId) {
  const e = state.edits[chunkId];
  if (!e) return null;
  if (e.tts !== undefined && e.subtitle !== undefined) return 'both';
  if (e.tts !== undefined) return 'tts';
  if (e.subtitle !== undefined) return 'subtitle';
  return null;
}

function countDirty() {
  let tts = 0, sub = 0;
  for (const e of Object.values(state.edits)) {
    if (e.tts !== undefined) tts++;
    if (e.subtitle !== undefined) sub++;
  }
  return { tts, sub };
}

// ============================================================
// RENDER: SIDEBAR
// ============================================================
function renderSidebar() {
  const list = document.getElementById('ep-list');
  list.innerHTML = Object.values(episodes).map(ep => {
    const sel = ep.id === state.selectedId;
    const dot = statusDot(ep.status);
    return `
      <div onclick="selectEp('${ep.id}')"
           class="px-2.5 py-2 rounded cursor-pointer flex items-center gap-2 mb-0.5
                  ${sel ? 'bg-neutral-900 text-white' : 'hover:bg-neutral-100'}">
        ${dot}
        <span class="font-medium text-sm">${ep.id}</span>
        <span class="ml-auto text-[11px] ${sel ? 'text-neutral-300' : 'text-neutral-400'} mono">
          ${ep.status === 'running' ? '⏵' : ep.status === 'done' ? ep.chunkCount : ep.status}
        </span>
      </div>
    `;
  }).join('');
}

function statusDot(status) {
  const colors = {
    done:    'bg-emerald-500',
    running: 'bg-blue-500 pulse-blue',
    ready:   'bg-neutral-300',
    failed:  'bg-red-500',
    empty:   'bg-neutral-200',
  };
  return `<span class="w-1.5 h-1.5 rounded-full ${colors[status] || 'bg-neutral-300'}"></span>`;
}

// ============================================================
// RENDER: MAIN
// ============================================================
function renderMain() {

  if (!ep) { document.getElementById('main').innerHTML = ''; return; }

  const main = document.getElementById('main');

    <div class="px-6 py-3 border-b border-neutral-200 bg-white shrink-0">
      <div class="flex items-center gap-3 mb-2">
        <h2 class="text-lg font-semibold">${ep.id}</h2>
        ${statusBadge(ep)}
        ${ep.stage ? `<span class="text-xs text-neutral-500 mono">${ep.stage}</span>` : ''}
      </div>
      <div class="flex gap-2">
        <button onclick="onRun()"
                class="px-3 py-1.5 text-sm bg-neutral-900 text-white rounded hover:bg-neutral-800
                       ${ep.status === 'running' ? 'opacity-50 cursor-not-allowed' : ''}">
          ▶ Run
        </button>
        <button onclick="onExport()"
                class="px-3 py-1.5 text-sm bg-white border border-neutral-300 rounded hover:bg-neutral-50
                       ${ep.status !== 'done' ? 'opacity-50 cursor-not-allowed' : ''}">
          ⤓ Export
        </button>
      </div>
    </div>

    ${renderEditBanner()}

    <!-- Chunks + Log split -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <!-- Chunks -->
      <div id="chunks-scroll" class="flex-1 overflow-y-auto scrollbar bg-white">
        <div class="px-6 py-2 sticky top-0 bg-white border-b border-neutral-100 flex items-center z-10">
          <h3 class="text-xs font-medium text-neutral-500 uppercase tracking-wide">Chunks</h3>
          <span class="ml-2 text-[11px] text-neutral-400">${(chunkData[ep.id] || []).length} 项</span>
          <span class="ml-auto text-[11px] text-neutral-400">点击 chunk → 展开编辑</span>
        </div>
        ${renderChunks()}
      </div>

      <!-- Log -->
      <div class="h-32 border-t border-neutral-200 bg-neutral-900 text-neutral-200 overflow-hidden flex flex-col shrink-0">
        <div class="px-4 py-1 border-b border-neutral-800 flex items-center text-[11px] text-neutral-400">
          <span class="uppercase tracking-wide">run.log</span>
          <span class="ml-auto mono">tail -f</span>
        </div>
        <div id="log" class="flex-1 overflow-y-auto scrollbar px-4 py-2 mono text-[11px] leading-relaxed"></div>
      </div>
    </div>
  `;

  renderLog();
  scrollToCurrentChunk();
}

function statusBadge(ep) {
  const map = {
    done:    ['bg-emerald-50', 'text-emerald-700', 'border-emerald-200', '✓ done'],
    running: ['bg-blue-50',    'text-blue-700',    'border-blue-200',    '⏵ running'],
    ready:   ['bg-neutral-50', 'text-neutral-600', 'border-neutral-200', 'ready'],
    failed:  ['bg-red-50',     'text-red-700',     'border-red-200',     '✗ failed'],
  };
  const [bg, fg, br, label] = map[ep.status] || map.ready;
  return `<span class="text-xs px-2 py-0.5 rounded-full border ${bg} ${fg} ${br}">${label}</span>`;
}

// ============================================================
// RENDER: EDIT BANNER
// ============================================================
function renderEditBanner() {
  const { tts, sub } = countDirty();
  if (tts === 0 && sub === 0) return '';

  const parts = [];
  if (tts > 0) parts.push(`<span class="text-amber-900"><b>${tts}</b> TTS 改动</span> <span class="text-amber-600 text-[11px]">→ 重新合成 + 重转写</span>`);
  if (sub > 0) parts.push(`<span class="text-amber-900"><b>${sub}</b> 字幕改动</span> <span class="text-amber-600 text-[11px]">→ 只重生字幕</span>`);

  return `
    <div class="px-6 py-2.5 bg-amber-50 border-b border-amber-200 flex items-center gap-4">
      <span class="text-amber-700">●</span>
      <div class="flex gap-4 text-sm">${parts.join('<span class="text-amber-300">|</span>')}</div>
      <div class="ml-auto flex gap-2">
        <button onclick="discardEdits()" class="text-xs px-2.5 py-1 text-amber-700 hover:bg-amber-100 rounded">Discard</button>
        <button onclick="applyEdits()" class="text-xs px-3 py-1 bg-amber-600 text-white rounded hover:bg-amber-700">Apply All</button>
      </div>
    </div>
  `;
}

// ============================================================
// RENDER: CHUNKS
// ============================================================
function renderChunks() {
  const chunks = chunkData[state.selectedId] || [];
  if (chunks.length === 0) {
    return `<div class="px-6 py-12 text-center text-sm text-neutral-400">还没有 chunks。点 Run 开始第一次合成。</div>`;
  }

  return `
    <table class="w-full text-sm">
      <thead class="text-[11px] text-neutral-400 uppercase tracking-wide">
        <tr class="border-b border-neutral-100">
          <th class="text-left font-medium px-6 py-2 w-44">ID</th>
          <th class="text-left font-medium py-2 w-12">St</th>
          <th class="text-left font-medium py-2 w-16">Dur</th>
          <th class="text-left font-medium py-2 w-12">Play</th>
          <th class="text-left font-medium py-2 pr-6">Subtitle</th>
          <th class="text-right font-medium py-2 pr-6 w-12">Edit</th>
        </tr>
      </thead>
      <tbody>
        ${chunks.map(c => {
          const editing = state.editing === c.id;
          return renderChunkRow(c) + (editing ? renderChunkEditor(c) : '');
        }).join('')}
      </tbody>
    </table>
  `;
}

function renderChunkRow(c) {
  const isEditing = state.editing === c.id;
  const dirtyType = getDirtyType(c.id);
  const isPlaying = state.playingChunkId === c.id;
  const isDirty = !!dirtyType;

  const statusIcon = {
    done:    '<span class="text-emerald-500">✓</span>',
    running: '<span class="text-blue-500 pulse-blue">⏵</span>',
    pending: '<span class="text-neutral-300">○</span>',
    failed:  '<span class="text-red-500">✗</span>',
  }[c.status] || '○';

  // 显示当前生效的文本(优先暂存的字幕改动)
  const e = state.edits[c.id] || {};
  const displaySubtitle = e.subtitle !== undefined
    ? stripControlMarkers(e.subtitle)
    : getDisplaySubtitle(c);
  const hasSubField = c.subtitle_text !== null && c.subtitle_text !== undefined;

  let dirtyBadge = '';
  if (dirtyType === 'tts')      dirtyBadge = '<span class="ml-2 text-[10px] px-1.5 py-0.5 bg-amber-100 text-amber-700 rounded">TTS dirty</span>';
  if (dirtyType === 'subtitle') dirtyBadge = '<span class="ml-2 text-[10px] px-1.5 py-0.5 bg-amber-100 text-amber-700 rounded">SUB dirty</span>';
  if (dirtyType === 'both')     dirtyBadge = '<span class="ml-2 text-[10px] px-1.5 py-0.5 bg-amber-100 text-amber-700 rounded">TTS+SUB dirty</span>';

  // Stage change 后禁用播放(必须 Apply 或 Discard 才能再听)
  const canPlay = c.status === 'done' && !isDirty;
  const playProgress = isPlaying && c.duration > 0
    ? Math.min(100, (state.chunkPlayElapsed / c.duration) * 100)
    : 0;

  // 卡拉 OK 字符遮罩: 已播放部分用深色,未播放用浅色
  const subtitleHtml = isPlaying
    ? renderKaraoke(displaySubtitle, playProgress)
    : `<span class="${isDirty ? 'text-amber-900' : 'text-neutral-700'}">${escapeHtml(displaySubtitle)}</span>`;

  return `
    <tr id="row-${c.id}"
        class="border-b border-neutral-100 ${isEditing ? '' : 'hover:bg-neutral-50'}
               ${isPlaying ? 'row-current' : ''}
               ${isDirty && !isEditing ? 'bg-amber-50/30' : ''}
               ${isEditing ? 'bg-neutral-50' : ''}">
      <td class="px-6 py-2.5 mono text-[11px] text-neutral-500 align-top">
        ${c.id}
        ${hasSubField ? '<span class="ml-1 text-[9px] text-purple-500" title="独立 subtitle_text">◆</span>' : ''}
      </td>
      <td class="py-2.5 align-top">${statusIcon}</td>
      <td class="py-2.5 align-top text-[11px] text-neutral-500 mono">${c.duration > 0 ? c.duration + 's' : '—'}</td>
      <td class="py-2.5 align-top">
        <button onclick="togglePlayChunk('${c.id}')"
                ${canPlay ? '' : 'disabled'}
                title="${isDirty ? '有暂存改动,Apply 后才能播放' : ''}"
                class="w-7 h-7 inline-flex items-center justify-center rounded
                       ${canPlay ? 'hover:bg-neutral-200 text-neutral-700' : 'text-neutral-300 cursor-not-allowed'}
                       ${isPlaying ? 'bg-neutral-900 text-white hover:bg-neutral-800' : ''}">
          ${isPlaying ? '⏸' : '▶'}
        </button>
      </td>
      <td class="py-2.5 pr-6 align-top">
        <div>${subtitleHtml}${dirtyBadge}</div>
        ${isPlaying ? `<div class="mt-0.5 text-[10px] text-neutral-400 mono">${state.chunkPlayElapsed.toFixed(1)}s / ${c.duration}s</div>` : ''}
      </td>
      <td class="py-2.5 pr-6 align-top text-right">
        <button onclick="${isEditing ? 'cancelEdit()' : `startEdit('${c.id}')`}"
                class="w-7 h-7 inline-flex items-center justify-center rounded ${isEditing ? 'bg-neutral-900 text-white hover:bg-neutral-800' : 'hover:bg-neutral-200 text-neutral-700'}"
                title="${isEditing ? '关闭编辑' : '编辑'}">
          ${isEditing ? '✕' : '✎'}
        </button>
      </td>
    </tr>
  `;
}

// 卡拉 OK 字符遮罩
function renderKaraoke(text, pct) {
  const chars = Array.from(text);
  const cut = Math.floor(chars.length * pct / 100);
  const played = escapeHtml(chars.slice(0, cut).join(''));
  const rest   = escapeHtml(chars.slice(cut).join(''));
  return `<span class="text-neutral-900 font-medium">${played}</span><span class="text-neutral-300">${rest}</span>`;
}

function renderChunkEditor(c) {
  const isCurrent = state.playingChunkId === c.id;
  const e = state.edits[c.id] || {};
  const ttsValue = e.tts !== undefined ? e.tts : c.text_normalized;
  const subValue = e.subtitle !== undefined ? e.subtitle : (c.subtitle_text || '');
  const hasSubField = c.subtitle_text !== null && c.subtitle_text !== undefined;

  return `
    <tr class="bg-neutral-50 border-b border-neutral-100">
      <td colspan="4" class="bg-neutral-50"></td>
      <td colspan="2" class="py-3 pr-6">
        <div class="bg-white border border-neutral-300 rounded-lg p-4 shadow-sm">
          <!-- field 1: TTS 源 -->
          <div class="mb-4">
            <div class="flex items-baseline gap-2 mb-1.5">
              <span class="text-xs">🔊</span>
              <span class="text-xs font-semibold text-neutral-700">TTS 源</span>
              <span class="text-[10px] text-neutral-400 mono">text_normalized</span>
              <span class="ml-auto text-[10px] text-amber-600">改 → 重新合成 + 重转写 (慢)</span>
            </div>
            <textarea id="edit-tts" rows="2" oninput="onEditInput(event)" data-field="tts"
                      class="w-full border border-neutral-300 rounded px-2.5 py-1.5 text-sm focus:outline-none focus:border-neutral-900 resize-none">${escapeHtml(ttsValue)}</textarea>
          </div>

          <!-- field 2: 字幕文本 -->
          <div class="mb-4">
            <div class="flex items-baseline gap-2 mb-1.5">
              <span class="text-xs">💬</span>
              <span class="text-xs font-semibold text-neutral-700">字幕文本</span>
              <span class="text-[10px] text-neutral-400 mono">subtitle_text</span>
              ${hasSubField
                ? '<span class="text-[10px] text-purple-600">◆ 已独立设置</span>'
                : '<span class="text-[10px] text-neutral-400">未设置 → 字幕兜底用 text 字段</span>'}
              <span class="ml-auto text-[10px] text-amber-600">改 → 只重生字幕 (快)</span>
            </div>
            <textarea id="edit-sub" rows="2" oninput="onEditInput(event)" data-field="subtitle"
                      placeholder="${escapeHtml(c.text)}"
                      class="w-full border border-neutral-300 rounded px-2.5 py-1.5 text-sm focus:outline-none focus:border-neutral-900 resize-none">${escapeHtml(subValue)}</textarea>
          </div>

          <!-- field 3: 原文 (read-only) -->
          <div class="mb-4">
            <div class="flex items-baseline gap-2 mb-1.5">
              <span class="text-xs">📄</span>
              <span class="text-xs font-semibold text-neutral-500">原文</span>
              <span class="text-[10px] text-neutral-400 mono">text</span>
              <span class="text-[10px] text-neutral-400">script.json 切分,只读</span>
            </div>
            <div class="px-2.5 py-1.5 text-sm bg-neutral-50 border border-neutral-200 rounded text-neutral-500">
              ${escapeHtml(c.text)}
            </div>
          </div>

          <!-- actions -->
          <div class="flex items-center gap-2 pt-3 border-t border-neutral-100">
            <button onclick="event.stopPropagation(); stageEdit('${c.id}')"
                    class="text-xs px-3 py-1.5 bg-amber-600 text-white rounded hover:bg-amber-700">
              Stage Change
            </button>
            <button onclick="event.stopPropagation(); cancelEdit()"
                    class="text-xs px-2.5 py-1.5 hover:bg-neutral-100 rounded text-neutral-600">
              Cancel
            </button>
            <span class="ml-auto text-[10px] text-neutral-400">
              改动会先暂存,顶部 Apply All 时统一执行(TTS 和字幕分别走不同流程)
            </span>
          </div>
        </div>
      </td>
    </tr>
  `;
}

// ============================================================
// LOG (animated)
// ============================================================
const logLines = [
  '=== TTS Agent Harness: ch04 ===',
  '=== P1: Text Chunking ===',
  '  shot01: 36 chars → 2 chunks',
  '  shot02: 42 chars → 2 chunks',
  '  ✓ 可逆性校验通过',
  '=== P2: TTS Synthesis ===',
  '  [TTS] shot01_chunk01: "你说比特币最近怎么样..."',
  '    → shot01_chunk01.wav (4.20s)',
  '  [TTS] shot02_chunk01: "B T C 突破了七万美元..."',
  '    → shot02_chunk01.wav (5.10s)',
  '=== P3: Transcribing 8 chunks ===',
  '  [TRANSCRIBE] shot01_chunk01...',
  '    转写: 你说比特币最近怎么样我跟你讲。',
  '  [TRANSCRIBE] shot02_chunk01...',
  '    转写: BTC 突破了七万美元的新高。',
  '=== P5: Subtitle Generation ===',
  '  shot02: 4 subtitle lines',
  '=== P6: Audio Concat ===',
  '  [CONCAT] shot02 → shot02.wav',
  '=== Done ===',
];
let logIndex = logLines.length;

function renderLog() {
  const logEl = document.getElementById('log');
  if (!logEl) return;
  logEl.innerHTML = logLines.slice(0, logIndex).map(l => `<div>${escapeHtml(l)}</div>`).join('');
  logEl.scrollTop = logEl.scrollHeight;
}
function escapeHtml(s) { return String(s ?? '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

// ============================================================
// CHUNK PLAYER (单 chunk 播放)
// ============================================================
function togglePlayChunk(chunkId) {
  // 切换:同 id 再点 = 暂停
  if (state.playingChunkId === chunkId) {
    stopChunkPlay();
    renderMain();
    return;
  }
  // 切到新 chunk
  stopChunkPlay();
  const chunk = (chunkData[state.selectedId] || []).find(c => c.id === chunkId);
  if (!chunk || chunk.status !== 'done') return;

  state.playingChunkId = chunkId;
  state.chunkPlayElapsed = 0;
  // mock: 按 chunk.duration 计时,到时自动停
  state.chunkPlayTimer = setInterval(() => {
    state.chunkPlayElapsed += 0.1;
    if (state.chunkPlayElapsed >= chunk.duration) {
      stopChunkPlay();
      renderMain();
    } else {
      // 局部更新进度,不全 re-render(避免编辑面板闪)
      updatePlayingRow();
    }
  }, 100);
  renderMain();
}

function updatePlayingRow() {
  const id = state.playingChunkId;
  if (!id) return;
  const row = document.getElementById(`row-${id}`);
  if (!row) return;
  const chunk = (chunkData[state.selectedId] || []).find(c => c.id === id);
  if (!chunk) return;
  const pct = Math.min(100, (state.chunkPlayElapsed / chunk.duration) * 100);

  // 重新生成卡拉 OK 字符遮罩
  const e = state.edits[id] || {};
  const text = e.subtitle !== undefined
    ? stripControlMarkers(e.subtitle)
    : getDisplaySubtitle(chunk);
  const subCell = row.querySelector('td:nth-child(5) > div:first-child');
  if (subCell) subCell.innerHTML = renderKaraoke(text, pct);

  // 更新时间显示
  const txt = row.querySelector('td:nth-child(5) .mono');
  if (txt) txt.textContent = `${state.chunkPlayElapsed.toFixed(1)}s / ${chunk.duration}s`;
}

function stopChunkPlay() {
  if (state.chunkPlayTimer) clearInterval(state.chunkPlayTimer);
  state.chunkPlayTimer = null;
  state.playingChunkId = null;
  state.chunkPlayElapsed = 0;
}

// ============================================================
// EDIT
// ============================================================
function startEdit(chunkId) {
  // 编辑期间允许继续播放,只在 Stage 后才禁用
  state.editing = chunkId;
  renderMain();
  setTimeout(() => {
    const ta = document.getElementById('edit-tts');
    if (ta) ta.focus();
  }, 0);
}

function cancelEdit() {
  state.editing = null;
  renderMain();
}

// ============================================================
// EDITS
// ============================================================
function onEditInput(e) {
  // 没什么要做的,值在 textarea 里,stage 时统一读
}

function stageEdit(chunkId) {
  const ttsEl = document.getElementById('edit-tts');
  const subEl = document.getElementById('edit-sub');
  const chunk = chunkData[state.selectedId].find(c => c.id === chunkId);
  if (!chunk) return;

  const newTts = ttsEl.value;
  const newSub = subEl.value;
  const origSub = chunk.subtitle_text || '';

  if (!state.edits[chunkId]) state.edits[chunkId] = {};

  // 只把"实际发生改动"的字段记入 edits
  if (newTts !== chunk.text_normalized) {
    state.edits[chunkId].tts = newTts;
  } else {
    delete state.edits[chunkId].tts;
  }

  if (newSub !== origSub) {
    state.edits[chunkId].subtitle = newSub;
  } else {
    delete state.edits[chunkId].subtitle;
  }

  if (Object.keys(state.edits[chunkId]).length === 0) {
    delete state.edits[chunkId];
    toast('没有改动');
  } else {
    const types = [];
    if (state.edits[chunkId].tts !== undefined) types.push('TTS');
    if (state.edits[chunkId].subtitle !== undefined) types.push('字幕');
    toast(`已暂存 ${chunkId} (${types.join('+')}),播放已禁用,Apply 后恢复`);
    // 暂存后该 chunk 进入 dirty 状态,如果正在播这个 chunk 就停掉
    if (state.playingChunkId === chunkId) stopChunkPlay();
  }

  state.editing = null;
  renderMain();
}

function discardEdits() {
  state.edits = {};
  renderMain();
  toast('已丢弃所有暂存改动');
}

function applyEdits() {
  const { tts, sub } = countDirty();
  const total = tts + sub;
  if (total === 0) return;

  const msg = [];
  if (tts > 0) msg.push(`${tts} 个 TTS 重做`);
  if (sub > 0) msg.push(`${sub} 个字幕重生`);
  toast(`正在执行: ${msg.join(', ')}`);

  // 应用改动到数据
  const chunks = chunkData[state.selectedId];
  for (const [cid, e] of Object.entries(state.edits)) {
    const c = chunks.find(c => c.id === cid);
    if (!c) continue;
    if (e.tts !== undefined) {
      c.text_normalized = e.tts;
      c.status = 'pending';
      c.duration = 0;
    }
    if (e.subtitle !== undefined) {
      c.subtitle_text = e.subtitle;
    }
  }
  state.edits = {};

  episodes[state.selectedId].status = 'running';
  episodes[state.selectedId].stage = tts > 0 ? 'P2 → P3 → P5/P6' : 'P5/P6';
  renderAll();

  // 模拟完成
  setTimeout(() => {
    for (const c of chunks) {
      if (c.status === 'pending') {
        c.status = 'done';
        c.duration = +(Math.random() * 3 + 3).toFixed(1);
      }
    }
    episodes[state.selectedId].status = 'done';
    episodes[state.selectedId].stage = '';
    renderAll();
    toast('Redo 完成');
  }, 2500);
}

// ============================================================
// EPISODE / RUN
// ============================================================
function selectEp(id) {
  state.selectedId = id;
  state.editing = null;
  stopChunkPlay();
  renderAll();
}

function onRun() {
  const ep = episodes[state.selectedId];
  if (ep.status === 'running') return;
  ep.status = 'running';
  ep.stage = 'P1';
  toast('Pipeline started');
  renderAll();

  setTimeout(() => { ep.stage = 'P2 (3/8)'; renderSidebar(); renderMain(); }, 800);
  setTimeout(() => { ep.stage = 'P3 (5/8)'; renderSidebar(); renderMain(); }, 1800);
  setTimeout(() => {
    ep.status = 'done'; ep.stage = '';
    for (const c of chunkData[ep.id] || []) { if (c.status !== 'done') { c.status = 'done'; c.duration = 4.5; } }
    renderAll();
    toast('Pipeline 完成');
  }, 3000);
}

function onExport() {
  const dir = prompt('导出到目录:', '/Users/xuelin/projects/remotion/public/tts');
  if (dir) toast(`已导出到 ${dir}`);
}

function openNewEp() { document.getElementById('new-modal').classList.replace('hidden', 'flex'); }
function closeNewEp() { document.getElementById('new-modal').classList.replace('flex', 'hidden'); }
function createEp() {
  const id = document.getElementById('new-ep-id').value.trim();
  if (!id) return;
  episodes[id] = { id, status: 'ready', stage: '', chunkCount: 0 };
  chunkData[id] = [];
  state.selectedId = id;
  closeNewEp();
  renderAll();
  toast(`已创建 ${id}`);
}

// ============================================================
// TOAST
// ============================================================
let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.replace('hidden', 'block');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.replace('block', 'hidden'), 2000);
}

// ============================================================
// INIT
// ============================================================
function renderAll() {
  renderSidebar();
  renderMain();
}
renderAll();
</script>
</body>
</html>
